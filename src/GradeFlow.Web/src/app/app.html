<header class="topbar">
  <a routerLink="/" class="brand"><span>GF</span>GradeFlow</a>
  <nav>
    @if (auth.current()) {
      <a routerLink="/assignments">Avaliações</a>
      <a routerLink="/assignments/new">Nova avaliação</a>
      <a routerLink="/change-password">Alterar senha</a>
      <button class="nav-button" type="button" (click)="logout()">Sair</button>
    }
  </nav>
</header>

@if (loading) {
  <div class="route-loading" role="status" aria-label="Carregando">
    <span></span>
  </div>
}

<main class="shell">
  <router-outlet />
</main>

<footer class="footer">
  Developed by Bernardo Tomaz
</footer>
