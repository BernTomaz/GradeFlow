<section class="page-header form-shell">
  <div>
    <h1>{{ assignmentId ? 'Editar avaliação' : 'Nova avaliação' }}</h1>
    <p>Informe os dados básicos para iniciar o gabarito.</p>
  </div>
</section>

@if (loading) {
  <p class="loading form-shell"></p>
} @else {
  <form [formGroup]="form" (ngSubmit)="save()" class="form form-shell">
    <label>
      Título
      <input formControlName="title" maxlength="200" />
    </label>
    <label>
      Disciplina
      <input formControlName="subject" maxlength="200" />
    </label>
    <label>
      Descrição
      <textarea formControlName="description" rows="4" maxlength="2000"></textarea>
    </label>
    <div class="actions form-actions">
      <a routerLink="/assignments" class="button">Voltar</a>
      <button class="button primary" type="submit" [disabled]="form.invalid">Salvar</button>
    </div>
  </form>
}
