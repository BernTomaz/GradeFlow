<section class="form-shell narrow-form-shell">
  <div class="page-header">
    <div>
      <h1>Alterar senha</h1>
      <p>Atualize sua senha de acesso.</p>
    </div>
    <a class="button" routerLink="/assignments">Voltar</a>
  </div>

  <form class="form card narrow-card" [formGroup]="form" (ngSubmit)="submit()">
    <label>
      Senha atual
      <input formControlName="currentPassword" type="password" autocomplete="current-password" />
    </label>

    <label>
      Nova senha
      <input formControlName="newPassword" type="password" autocomplete="new-password" />
    </label>

    <div
      class="password-meter"
      [class.weak]="passwordStrength().level === 'weak'"
      [class.medium]="passwordStrength().level === 'medium'"
      [class.strong]="passwordStrength().level === 'strong'">
      <span></span>
      <small>{{ passwordStrength().label }}</small>
    </div>
    <ul class="password-rules">
      @for (rule of passwordRules(); track rule.label) {
        <li [class.ok]="rule.ok">{{ rule.label }}</li>
      }
    </ul>

    <label>
      Confirmar nova senha
      <input formControlName="confirmPassword" type="password" autocomplete="new-password" />
    </label>

    @if (error) {
      <div class="error">{{ error }}</div>
    }

    @if (success) {
      <div class="success">{{ success }}</div>
    }

    <div class="actions form-actions">
      <button class="button primary" type="submit" [disabled]="form.invalid">Salvar senha</button>
    </div>
  </form>
</section>
